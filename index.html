<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nexus — Vice City AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0a0f2b;
      color: #fdfdfd;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,140,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,140,255,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(13,20,56,0.95);
      border-bottom: 1px solid rgba(79,140,255,0.4);
      backdrop-filter: blur(10px);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      background: linear-gradient(90deg, #4f8cff, #a0c4ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.15em;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-family: 'Share Tech Mono', monospace;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4f8cff;
      box-shadow: 0 0 8px #4f8cff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .header-right {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(79,140,255,0.6);
      letter-spacing: 0.1em;
    }

    /* ── Layout ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(13,20,56,0.95);
      border-right: 1px solid rgba(79,140,255,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(79,140,255,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(79,140,255,0.7);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .new-chat-btn {
      background: rgba(79,140,255,0.15);
      border: 1px solid rgba(79,140,255,0.3);
      border-radius: 6px;
      padding: 5px 10px;
      color: #4f8cff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: rgba(79,140,255,0.25); }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .conversation-list::-webkit-scrollbar { width: 3px; }
    .conversation-list::-webkit-scrollbar-thumb { background: rgba(79,140,255,0.2); border-radius: 2px; }

    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 2px;
    }
    .conv-item:hover  { background: rgba(79,140,255,0.1);  color: #fdfdfd; }
    .conv-item.active { background: rgba(79,140,255,0.2);  color: #fdfdfd; border: 1px solid rgba(79,140,255,0.3); }
    .conv-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .conv-delete:hover { color: #ff4f4f; }

    /* ── Chat wrapper ── */
    .chat-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar       { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(79,140,255,0.3); border-radius: 2px; }

    .messages-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: bold;
    }
    .avatar.bot {
      background: linear-gradient(135deg, #4f8cff, #0d1438);
      color: #fff;
      box-shadow: 0 0 12px rgba(79,140,255,0.5);
    }
    .avatar.user {
      background: linear-gradient(135deg, #a0c4ff, #4f8cff);
      color: #0a0f2b;
      box-shadow: 0 0 12px rgba(79,140,255,0.4);
    }

    .bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }
    .message-row.bot .bubble {
      background: rgba(79,140,255,0.08);
      border: 1px solid rgba(79,140,255,0.25);
      border-top-left-radius: 0;
      color: #c8d8ff;
    }
    .message-row.user .bubble {
      background: rgba(160,196,255,0.1);
      border: 1px solid rgba(160,196,255,0.3);
      border-top-right-radius: 0;
      color: #e8f0ff;
    }

    /* ── Typing indicator ── */
    .typing-row {
      display: none;   /* shown via JS as flex */
      gap: 12px;
      align-items: flex-start;
    }
    .typing-bubble {
      background: rgba(79,140,255,0.08);
      border: 1px solid rgba(79,140,255,0.25);
      border-radius: 4px;
      border-top-left-radius: 0;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4f8cff;
      animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1);   }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px 20px;
      background: rgba(13,20,56,0.95);
      border-top: 1px solid rgba(79,140,255,0.2);
      backdrop-filter: blur(10px);
    }
    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(79,140,255,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(79,140,255,0.7);
      box-shadow: 0 0 16px rgba(79,140,255,0.15);
    }
    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fdfdfd;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
    }
    .input-wrapper input::placeholder { color: rgba(255,255,255,0.25); }
    .input-wrapper button {
      background: linear-gradient(135deg, #4f8cff, #0d1438);
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-transform: uppercase;
    }
    .input-wrapper button:hover  { opacity: 0.85; }
    .input-wrapper button:active { transform: scale(0.97); }
    .input-hint {
      max-width: 760px;
      margin: 8px auto 0;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      font-family: 'Share Tech Mono', monospace;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">NEXUS</div>
      <div class="status">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>
    <div class="header-right">VICE CITY AI // 1986</div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Chats</div>
        <button class="new-chat-btn" id="new-chat-btn">+ New</button>
      </div>
      <div class="conversation-list" id="conversation-list"></div>
    </div>

    <!-- Chat -->
    <div class="chat-wrapper">
      <div class="chat-area" id="chat-area">
        <div class="messages-wrapper" id="chat-logs">
          <!-- messages injected here by JS -->
        </div>
      </div>

      <!-- Typing indicator lives OUTSIDE messages-wrapper so it always sticks below -->
      <div class="typing-row" id="typing-indicator" style="max-width:760px;margin:0 auto;padding:0 24px 16px;width:100%;">
        <div class="avatar bot">NX</div>
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input id="user-input" type="text" placeholder="Ask me anything, hotshot..." autocomplete="off" />
          <button id="send-btn">Send</button>
        </div>
        <div class="input-hint">Press Enter to send</div>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
